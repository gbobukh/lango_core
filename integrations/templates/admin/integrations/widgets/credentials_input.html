<div id="credentials-container-{{ widget.name }}">
    <input type="hidden" name="{{ widget.name }}" id="id_{{ widget.name }}" value="{{ widget.value|default:'' }}">

    <div id="dynamic-fields-{{ widget.name }}" class="dynamic-credentials-fields">
        <!-- Fields will be injected here by JS -->
        <p class="help">Select an API Auth Type to see required credential fields.</p>
    </div>
</div>

<style>
    .dynamic-credentials-fields {
        margin-top: 10px;
        padding: 10px;
        background: #f8f9fa;
        border: 1px solid #eee;
        border-radius: 4px;
    }

    .credential-row {
        margin-bottom: 10px;
    }

    .credential-row label {
        display: block;
        font-weight: bold;
        margin-bottom: 5px;
        color: #666;
    }

    .credential-row input {
        width: 100%;
        padding: 6px;
        border: 1px solid #ccc;
        border-radius: 3px;
    }
</style>

<script>
    (function ($) {
        $(document).ready(function () {
            const container = $('#credentials-container-{{ widget.name }}');
            const hiddenInput = $('#id_{{ widget.name }}');
            const dynamicFields = $('#dynamic-fields-{{ widget.name }}');
            const authTypeSelect = $('#id_auth_type'); // Assuming standard Django ID

            // Initial value (decrypted JSON string)
            let currentValues = {};
            try {
                const val = hiddenInput.val();
                if (val) {
                    currentValues = JSON.parse(val);
                }
            } catch (e) {
                console.error("Error parsing initial credentials:", e);
            }

            function updateHiddenInput() {
                const values = {};
                container.find('.credential-input').each(function () {
                    const key = $(this).data('key');
                    const val = $(this).val();
                    if (val) values[key] = val;
                });
                hiddenInput.val(JSON.stringify(values));
            }

            function renderFields(keys) {
                dynamicFields.empty();
                if (!keys || keys.length === 0) {
                    dynamicFields.html('<p class="help">No keys defined for this Auth Type.</p>');
                    return;
                }

                keys.forEach(key => {
                    const val = currentValues[key] || '';
                    const row = $('<div class="credential-row"></div>');
                    row.append(`<label>${key}:</label>`);

                    const inputGroup = $('<div style="display: flex; align-items: center;"></div>');
                    const input = $(`<input type="password" class="credential-input" data-key="${key}" style="flex-grow: 1; margin-right: 5px;">`);
                    input.val(val);

                    const toggleBtn = $('<span style="cursor: pointer; font-size: 16px; user-select: none;" title="Show/Hide">👁️</span>');
                    toggleBtn.on('click', function () {
                        const type = input.attr('type');
                        if (type === 'password') {
                            input.attr('type', 'text');
                            toggleBtn.css('opacity', '0.6');
                        } else {
                            input.attr('type', 'password');
                            toggleBtn.css('opacity', '1.0');
                        }
                    });

                    input.on('input', updateHiddenInput);

                    inputGroup.append(input);
                    inputGroup.append(toggleBtn);

                    row.append(inputGroup);
                    dynamicFields.append(row);
                });
            }

            function fetchKeys(typeId) {
                if (!typeId) {
                    dynamicFields.html('<p class="help">Select an API Auth Type to see required credential fields.</p>');
                    return;
                }

                $.ajax({
                    url: `/integrations/api/auth-type-keys/${typeId}/`,
                    method: 'GET',
                    success: function (data) {
                        renderFields(data.keys);
                    },
                    error: function (err) {
                        console.error("Error fetching keys:", err);
                        dynamicFields.html('<p class="error">Error loading key definitions.</p>');
                    }
                });
            }

            // Event listener for Auth Type change
            if (authTypeSelect.length) {
                authTypeSelect.on('change', function () {
                    // Clear current values when switching type? Maybe safer.
                    // currentValues = {}; // Uncomment to clear on switch
                    fetchKeys($(this).val());
                });

                // Initial load
                if (authTypeSelect.val()) {
                    fetchKeys(authTypeSelect.val());
                }
            } else {
                console.warn("Auth Type select field not found (id_auth_type).");
            }
        });
    })(django.jQuery);
</script>
