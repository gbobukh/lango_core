# HTTP only — after DNS works, run:
#   sudo certbot --nginx -d staging-core.lango.media
# Certbot will add TLS and adjust this file (or add a second server block manually).
#
# Install: sudo cp ... /etc/nginx/sites-available/staging-core.lango.media
#          sudo ln -sf /etc/nginx/sites-available/staging-core.lango.media /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name staging-core.lango.media www.staging-core.lango.media;

    access_log /var/log/nginx/staging-core.lango.media.access.log;
    error_log /var/log/nginx/staging-core.lango.media.error.log;
    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header CF-Visitor $http_cf_visitor;
        proxy_set_header CF-Ray $http_cf_ray;
        proxy_set_header CF-Country $http_cf_country;

        proxy_connect_timeout 300s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /static/ {
        alias /var/www/lango_core_static_staging/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
